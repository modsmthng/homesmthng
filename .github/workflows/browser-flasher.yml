name: Browser flasher

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version label to publish (for example v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: read

concurrency:
  group: browser-flasher-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' && github.event_name != 'workflow_dispatch' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

      - name: Verify official legal-content configuration
        if: >-
          (github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
          github.repository == 'modsmthng/homesmthng'
        shell: bash
        env:
          LEGAL_CONTENT_REPOSITORY: ${{ vars.LEGAL_CONTENT_REPOSITORY }}
          LEGAL_CONTENT_PATH: ${{ vars.LEGAL_CONTENT_PATH }}
          LEGAL_CONTENT_SSH_KEY: ${{ secrets.LEGAL_CONTENT_SSH_KEY }}
        run: |
          if [[ -z "$LEGAL_CONTENT_REPOSITORY" || -z "$LEGAL_CONTENT_PATH" || -z "$LEGAL_CONTENT_SSH_KEY" ]]; then
            echo "Official Pages deployments require the private legal-content repository, path and read-only deploy key."
            exit 1
          fi

      - name: Check out private legal content
        if: >-
          (github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
          vars.LEGAL_CONTENT_REPOSITORY != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.LEGAL_CONTENT_REPOSITORY }}
          ref: main
          ssh-key: ${{ secrets.LEGAL_CONTENT_SSH_KEY }}
          path: .legal-content
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install firmware build tools
        run: python -m pip install platformio -r requirements-build.txt

      - name: Select firmware version
        id: version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "value=ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all supported displays
        env:
          HOMESMTHNG_VERSION: ${{ steps.version.outputs.value }}
        run: platformio run -e trgb_full_circle -e lilygo_amoled_175 -e waveshare_amoled_175

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-flasher/package-lock.json

      - name: Install browser-flasher dependencies
        run: npm ci --prefix web-flasher

      - name: Test browser-flasher behavior
        run: npm test --prefix web-flasher

      - name: Prepare firmware assets
        run: >-
          python scripts/prepare_flasher_release.py
          --version "${{ steps.version.outputs.value }}"
          --output .flasher-release

      - name: Validate firmware index and checksums
        run: npm run validate-release --prefix web-flasher -- ../.flasher-release

      - name: Build static installer
        env:
          FLASHER_PUBLIC_DIR: ${{ github.workspace }}/.flasher-release
          LEGAL_CONTENT_DIR: >-
            ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
                vars.LEGAL_CONTENT_REPOSITORY != '' &&
                format('{0}/.legal-content/{1}', github.workspace, vars.LEGAL_CONTENT_PATH) || '' }}
        run: npm run build --prefix web-flasher

      - name: Configure GitHub Pages
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-flasher/dist

  deploy:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
